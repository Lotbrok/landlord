# /etc/nginx/sites-available/landlord
#
# Subdomain: landlord.cyphorium.com → Docker container on port 3000
# Your main cyphorium.com site is NOT affected.
#
# After certbot SSL this file will be auto-updated.

server {
    listen 80;
    server_name landlord.cyphorium.com;

    # Redirect all HTTP → HTTPS (filled in by certbot)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name landlord.cyphorium.com;

    # SSL certs (certbot fills these in)
    ssl_certificate     /etc/letsencrypt/live/landlord.cyphorium.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/landlord.cyphorium.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # Proxy to Docker container
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  "upgrade";
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Static client files — serve directly with caching
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:3000;
        expires    7d;
        add_header Cache-Control "public, immutable";
    }
}
